    header{

    .video-wrapper{
      width:720px;
      max-width:90%;
      background:black;
      border-radius:10px;
      overflow:hidden;
    }

    video{
      width:100%;
      display:block;
      background:black;
    }

    .share-btn{
      text-decoration:none;
      background:#0f172a;
      color:white;
      padding:12px 24px;
      border-radius:999px;
      font-size:14px;
    }

    footer{
      text-align:center;
      padding:24px;
      font-size:13px;
      color:#666;
      display:flex;
      justify-content:center;
      gap:30px;
    }

    footer a{
      text-decoration:none;
      color:#666;
    }

    @media(max-width:768px){
      header{
        padding:14px 16px;
      }

      .container{
        padding:0 12px;
      }

      footer{
        flex-direction:column;
        gap:10px;
      }
    }
  </style>

    // CTRL+SHIFT+I
